name: Reusable Check Links

on:
  workflow_call:
    inputs:
      lychee-config:
        type: string
        default: ".lychee.toml"
      markdown-glob:
        type: string
        default: "'./**/*.md'"
      definitive-error-regex:
        type: string
        default: "^\\s*\\* \\[(404|410)\\]"
      transient-error-regex:
        type: string
        default: "^\\s*\\* \\[5\\d{2}\\]|^\\s*\\* \\[ERROR\\]|^\\s*\\* \\[TIMEOUT\\]"
      fix-branch:
        type: string
        default: "fix/broken-links"
      issue-assignees:
        type: string
        default: "jslee02"
      infra-ref:
        type: string
        default: "main"

jobs:
  check-links:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config ${{ inputs.lychee-config }}
            --verbose
            --no-progress
            ${{ inputs.markdown-glob }}
          fail: false
          output: lychee/results.md

      - name: Fail on definitive broken links
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          if grep -qP '${{ inputs.definitive-error-regex }}' lychee/results.md 2>/dev/null; then
            echo "::error::Broken links found:"
            grep -P '${{ inputs.definitive-error-regex }}' lychee/results.md
            exit 1
          fi
          if grep -qP '${{ inputs.transient-error-regex }}' lychee/results.md 2>/dev/null; then
            echo "::warning::Transient failures (not blocking PR):"
            grep -P '${{ inputs.transient-error-regex }}' lychee/results.md
          fi
          echo "No definitive broken links found"

  fix-links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config ${{ inputs.lychee-config }}
            --verbose
            --no-progress
            --suggest
            --archive wayback
            --format json
            ${{ inputs.markdown-glob }}
          fail: false
          output: lychee/results.json

      - name: Checkout shared infra
        if: steps.lychee.outputs.exit_code != 0
        uses: actions/checkout@v6
        with:
          repository: jslee02/awesome-list-infra
          ref: ${{ inputs.infra-ref }}
          path: .awesome-list-infra

      - name: Fix broken links
        if: steps.lychee.outputs.exit_code != 0
        id: fix
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=.awesome-list-infra/src \
            python -m awesome_list_infra.fix_links lychee/results.json

      - name: Create pull request with fixes
        if: steps.fix.outputs.fixes_applied == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "fix: replace broken links with updated URLs"
          title: "fix: auto-fix broken links"
          body-path: lychee/fix-summary.md
          branch: ${{ inputs.fix-branch }}
          delete-branch: true
          labels: maintenance

      - name: Create issue for unfixable links
        if: steps.fix.outputs.has_unfixable == 'true'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Link Checker: broken links requiring manual fix"
          content-filepath: lychee/unfixed-links.md
          labels: maintenance
          assignees: ${{ inputs.issue-assignees }}

