name: Audit Direct Resource PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "data/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  audit:
    uses: jslee02/awesome-list-infra/.github/workflows/audit-direct-resource-pr.yml@main
